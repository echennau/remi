<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>remy - tokens tearsheet</title>
    <link rel="stylesheet" href="./tearsheet.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--color-bg-default);
        color: var(--color-fg-default);
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.55;
        padding: 48px 64px;
        max-width: 960px;
        margin: 0 auto;
      }

      .section {
        margin-bottom: 56px;
      }
      .section-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--color-fg-muted);
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--color-bg-surface);
      }
      .section-sublabel {
        font-size: 11px;
        color: var(--color-fg-muted);
        margin: 16px 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .ramp {
        display: flex;
        gap: 4px;
        margin-bottom: 4px;
      }
      .sw {
        flex: 1;
        border-radius: 5px;
        overflow: hidden;
        background: var(--color-bg-surface);
      }
      .sw-color {
        height: 32px;
      }
      .sw-label {
        padding: 4px 5px;
      }
      .sw-step {
        font-size: 9px;
        color: var(--color-neutral-500);
        font-family: monospace;
        display: block;
        word-break: break-all;
      }
      .sw-hex {
        font-size: 9px;
        color: var(--color-neutral-400);
        font-family: monospace;
        display: block;
        line-height: 1.4;
        word-break: break-all;
      }

      .theme-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .bg-theme {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .bg-card {
        padding: 10px 12px;
        border-radius: 8px;
      }
      .bg-card-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 8px;
      }
      .bg-card-name {
        font-size: 10px;
        font-family: monospace;
      }
      .bg-card-hex {
        font-size: 9px;
        font-family: monospace;
        opacity: 0.65;
      }
      .fg-swatches {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
      }
      .fg-dot {
        display: flex;
        align-items: flex-start;
        gap: 5px;
      }
      .fg-dot-color {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .fg-dot-info {
        display: flex;
        flex-direction: column;
      }
      .fg-dot-name {
        font-size: 8px;
        font-family: monospace;
        line-height: 1.4;
      }
      .fg-dot-hex {
        font-size: 8px;
        font-family: monospace;
        line-height: 1.4;
        opacity: 0.6;
      }

      .spacing-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 5px;
      }
      .spacing-bar {
        background: var(--color-primary);
        border-radius: 2px;
        height: 8px;
        flex-shrink: 0;
        opacity: 0.85;
      }
      .spacing-name {
        font-family: monospace;
        font-size: 11px;
        color: var(--color-fg-muted);
        width: 110px;
        flex-shrink: 0;
      }
      .spacing-val {
        font-family: monospace;
        font-size: 11px;
        color: var(--color-fg-body);
      }

      .radius-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 12px;
      }
      .radius-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .radius-swatch {
        width: 64px;
        height: 64px;
        background: var(--color-primary);
        opacity: 0.25;
      }
      .radius-label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }
      .radius-name {
        font-size: 10px;
        font-family: monospace;
        color: var(--color-fg-muted);
      }
      .radius-val {
        font-size: 9px;
        font-family: monospace;
        color: var(--color-fg-body);
      }

      .type-row {
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--color-bg-surface);
      }
      .type-row:last-child {
        border-bottom: none;
      }
      .type-meta {
        font-size: 10px;
        color: var(--color-fg-muted);
        font-family: monospace;
        margin-top: 6px;
      }

      .shadow-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .shadow-card {
        background: var(--color-bg-surface);
        border-radius: 8px;
        padding: 28px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .shadow-swatch {
        width: 56px;
        height: 56px;
        border-radius: 8px;
        background: var(--color-bg-raised);
      }
      .shadow-name {
        font-size: 10px;
        color: var(--color-fg-muted);
        font-family: monospace;
      }

      .motion-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 20px;
      }
      .ball-col-label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
        gap: 8px;
      }
      .ball-col-name {
        font-size: 10px;
        font-family: monospace;
        color: var(--color-fg-muted);
      }
      .ball-col-meta {
        font-size: 10px;
        font-family: monospace;
        color: var(--color-fg-body);
        white-space: nowrap;
      }
      .ball-track {
        background: var(--color-bg-raised);
        border-radius: 8px;
        height: 48px;
        position: relative;
        overflow: hidden;
      }
      .ball {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--color-primary-400);
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        box-shadow: 0 0 14px rgba(255, 121, 59, 0.6);
      }
      .ball.d-sm {
        animation: slide var(--duration-sm) linear alternate infinite;
      }
      .ball.d-md {
        animation: slide var(--duration-md) linear alternate infinite;
      }
      .ball.d-lg {
        animation: slide var(--duration-lg) linear alternate infinite;
      }
      .ball.d-xl {
        animation: slide var(--duration-xl) linear alternate infinite;
      }
      @keyframes slide {
        from {
          left: 14px;
        }
        to {
          left: calc(100% - 34px);
        }
      }

      /* component state demos */
      .demo-grid {
        display: grid;
        grid-template-columns: 72px 1fr 1fr 1fr 1fr;
        gap: 0 12px;
        margin-top: 4px;
      }
      .demo-header {
        font-size: 9px;
        font-family: monospace;
        color: var(--color-fg-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--color-bg-surface);
      }
      .demo-cell {
        padding: 10px 0;
        border-bottom: 1px solid var(--color-bg-surface);
        display: flex;
        align-items: center;
      }
      .demo-cell:nth-last-child(-n + 5) {
        border-bottom: none;
      }
      .demo-state {
        font-size: 10px;
        font-family: monospace;
        color: var(--color-fg-muted);
      }

      .demo-btn {
        font-size: 12px;
        font-weight: 500;
        padding: 5px 12px;
        border-radius: var(--radius-sm);
        border: none;
        cursor: pointer;
        line-height: 1.4;
      }

      .demo-btn-primary {
        background: var(--color-primary);
        color: #fff;
      }
      .demo-btn-primary.is-hover {
        background: var(--color-primary-hover);
      }
      .demo-btn-primary.is-focus {
        background: var(--color-primary-focus);
        outline: 2px solid var(--color-primary-focus);
        outline-offset: 2px;
      }
      .demo-btn-primary.is-active {
        background: var(--color-primary-active);
      }
      .demo-btn-primary.is-disabled,
      .demo-btn-primary:disabled {
        background: var(--color-primary-disabled);
        cursor: not-allowed;
      }

      .demo-btn-neutral {
        background: var(--color-bg-raised);
        color: var(--color-fg-default);
        border: 1px solid var(--color-bg-surface);
      }
      .demo-btn-neutral.is-hover {
        background: var(--color-neutral-hover);
      }
      .demo-btn-neutral.is-focus {
        background: var(--color-neutral-focus);
        outline: 2px solid var(--color-primary-focus);
        outline-offset: 2px;
      }
      .demo-btn-neutral.is-active {
        background: var(--color-neutral-active);
      }
      .demo-btn-neutral.is-disabled,
      .demo-btn-neutral:disabled {
        background: var(--color-neutral-disabled);
        color: var(--color-fg-muted);
        cursor: not-allowed;
      }

      .demo-link {
        color: var(--color-primary);
        text-decoration: underline;
        font-size: 13px;
        cursor: pointer;
      }
      .demo-link.is-hover {
        color: var(--color-primary-hover);
      }
      .demo-link.is-focus {
        color: var(--color-primary-focus);
        outline: 2px solid var(--color-primary-focus);
        outline-offset: 2px;
        border-radius: 2px;
        text-decoration: none;
      }
      .demo-link.is-active {
        color: var(--color-primary-active);
      }
      .demo-link.is-disabled {
        color: var(--color-primary-disabled);
        text-decoration: none;
        cursor: default;
      }

      .demo-input {
        font-family: "Space Grotesk", sans-serif;
        font-size: 12px;
        padding: 5px 8px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--color-bg-raised);
        background: var(--color-bg-surface);
        color: var(--color-fg-default);
        outline: none;
        width: 100%;
      }
      .demo-input.is-hover {
        border-color: var(--color-neutral-hover);
      }
      .demo-input.is-focus {
        border-color: var(--color-primary-focus);
        outline: 2px solid var(--color-primary-focus);
        outline-offset: 2px;
      }
      .demo-input.is-active {
        border-color: var(--color-primary-active);
      }
      .demo-input.is-disabled,
      .demo-input:disabled {
        background: var(--color-neutral-disabled);
        border-color: transparent;
        color: var(--color-fg-muted);
        cursor: not-allowed;
      }

      .theme-toggle {
        background: var(--color-bg-surface);
        border: 1px solid var(--color-bg-surface);
        border-radius: 6px;
        color: var(--color-fg-muted);
        cursor: pointer;
        font-family: monospace;
        font-size: 11px;
        padding: 5px 10px;
        letter-spacing: 0.05em;
      }
      .theme-toggle:hover {
        color: var(--color-fg-default);
      }

      .ts-footer {
        border-top: 1px solid var(--color-bg-surface);
        padding-top: 16px;
        font-size: 11px;
        color: var(--color-fg-muted);
        display: flex;
        justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <div
      style="
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        border-bottom: 1px solid var(--color-bg-surface);
        padding-bottom: 24px;
        margin-bottom: 48px;
      "
    >
      <div>
        <div
          style="
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--color-fg-muted);
          "
        >
          Design System
        </div>
        <div
          style="
            font-size: 32px;
            font-weight: 500;
            color: var(--color-fg-emphasis);
            letter-spacing: -0.02em;
            text-shadow:
              0 0 32px rgba(255, 121, 59, 0.45),
              0 0 8px rgba(255, 121, 59, 0.6);
          "
        >
          remy
        </div>
      </div>
      <div style="display: flex; align-items: flex-start; gap: 20px">
        <button
          class="theme-toggle"
          onclick="
            document.documentElement.dataset.theme =
              document.documentElement.dataset.theme === 'light' ? '' : 'light'
          "
        >
          toggle light / dark
        </button>
      </div>
    </div>

    <div id="app"></div>

    <div class="ts-footer">
      <span>remy design system</span>
      <span>dynamic tearsheet</span>
    </div>

    <script type="module" src="./tearsheet-render.js"></script>
  </body>
</html>
