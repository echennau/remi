<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>remi design system</title>
    <link
      rel="preload"
      href="../dist/fonts/SpaceGrotesk-VariableFont_wght.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="../dist/fonts/Montserrat-VariableFont_wght.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="../dist/fonts/SourceCodePro-VariableFont_wght.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav class="showcase-nav">
      <div class="showcase-nav-links">
        <a href="#theme">Theme</a>
        <a href="#typography">Typography</a>
        <a href="#components">Components</a>
      </div>
      <button
        class="tertiary"
        onclick="
          document.documentElement.dataset.theme =
            document.documentElement.dataset.theme === 'light' ? '' : 'light'
        "
      >
        toggle light / dark
      </button>
    </nav>

    <header class="ts-header">
      <h1>remi design system</h1>
    </header>

    <main id="app"></main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
